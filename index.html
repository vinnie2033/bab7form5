<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabaran Sejarah Bab 7 - 全班大同步</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #1e3a8a 0%, #dc2626 100%);
        }
        .ans-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ans-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Start Screen -->
    <div id="start-screen" class="w-full max-w-md bg-white rounded-3xl shadow-2xl mt-10 overflow-hidden text-center p-8 border-b-8 border-yellow-400">
        <div class="mb-6">
            <div class="w-24 h-24 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl rotate-3">
                <span class="text-5xl">🇲🇾</span>
            </div>
            <h1 class="text-3xl font-800 text-blue-900 mb-2">Sejarah F5 Bab 7</h1>
            <p class="text-gray-500 font-semibold italic text-sm">Membina Kesejahteraan Negara</p>
        </div>
        
        <div class="space-y-4">
            <div class="text-left">
                <label class="block text-xs font-bold text-gray-400 mb-1 ml-1 uppercase tracking-widest">Masukkan Nama Anda</label>
                <input type="text" id="player-name" placeholder="Contoh: Ali bin Abu" class="w-full p-4 rounded-xl border-2 border-gray-100 focus:border-blue-500 outline-none transition-all font-bold">
            </div>
            
            <button onclick="startGame()" class="w-full gradient-bg text-white font-black py-4 rounded-2xl shadow-lg hover:brightness-110 transform transition-all text-xl uppercase tracking-tighter">
                Mula Cabaran!
            </button>
        </div>
        <div class="mt-8 p-4 bg-blue-50 rounded-2xl text-xs text-blue-800 leading-relaxed font-medium">
            🚩 这是一个实时竞技场，所有同学的分数都会显示在排行榜上！
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden w-full max-w-md bg-white rounded-3xl shadow-2xl mt-4 overflow-hidden p-6">
        <div class="flex justify-between items-end mb-4">
            <div>
                <span class="text-[10px] text-gray-400 font-bold uppercase block">Pemain: <span id="display-name" class="text-blue-600">---</span></span>
                <span class="text-sm font-black text-gray-700" id="question-counter">Soalan 1/15</span>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-gray-400 font-bold uppercase block">Mata</span>
                <div class="text-2xl font-black text-yellow-500" id="score-display">0</div>
            </div>
        </div>
        
        <div class="w-full bg-gray-100 h-3 rounded-full mb-6 overflow-hidden">
            <div id="progress-fill" class="h-full bg-blue-600 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <div class="mb-8 min-h-[100px] flex items-center">
            <h2 id="question-text" class="text-xl font-bold text-gray-800 leading-tight">Loading...</h2>
        </div>

        <div id="options-container" class="grid grid-cols-1 gap-3 mb-8">
            <!-- Options here -->
        </div>

        <!-- Leaderboard Preview -->
        <div class="mt-4 bg-gray-50 rounded-2xl p-4 border border-gray-100">
            <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-3 flex items-center">
                <span class="mr-2">🔥</span> Top 3 Live Rankings
            </h3>
            <div id="mini-leaderboard" class="space-y-2">
                <p class="text-xs text-gray-400 italic">Menunggu pemain lain...</p>
            </div>
        </div>

        <!-- Feedback Overlay -->
        <div id="feedback-overlay" class="hidden fixed inset-0 bg-blue-900/40 backdrop-blur-md flex items-center justify-center p-6 z-50">
            <div class="bg-white rounded-3xl p-8 max-w-xs w-full text-center shadow-2xl">
                <div id="feedback-icon" class="text-7xl mb-4">✅</div>
                <h3 id="feedback-title" class="text-3xl font-black mb-2">Betul!</h3>
                <p id="feedback-text" class="text-gray-500 mb-8 text-sm leading-relaxed"></p>
                <button onclick="nextQuestion()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all uppercase">Seterusnya</button>
            </div>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden w-full max-w-md bg-white rounded-3xl shadow-2xl mt-10 overflow-hidden text-center p-8">
        <div class="mb-6">
            <div class="text-6xl mb-2">🏆</div>
            <h2 class="text-3xl font-black text-blue-900">Keputusan Akhir</h2>
            <p class="text-gray-400 text-sm">Tahniah kerana telah menamatkan cabaran!</p>
        </div>
        
        <div class="mb-8 bg-blue-50 py-6 rounded-3xl">
            <div class="text-7xl font-black text-blue-600" id="final-score">0</div>
            <p class="text-xs font-bold text-blue-400 uppercase tracking-widest mt-2">Mata Terkumpul</p>
        </div>
        
        <div class="text-left mb-8">
            <h3 class="font-black text-gray-800 mb-4 border-b pb-2 flex justify-between uppercase text-xs tracking-widest">
                <span>Leaderboard Kelas</span>
                <span>Score</span>
            </h3>
            <div id="final-leaderboard" class="space-y-2 max-h-60 overflow-y-auto pr-2">
                <!-- Final Scores -->
            </div>
        </div>

        <button onclick="location.reload()" class="w-full border-2 border-blue-600 text-blue-600 font-black py-4 rounded-2xl hover:bg-blue-50 transition-all uppercase">
            Main Lagi
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const baseAppId = typeof __app_id !== 'undefined' ? __app_id : 'sej-f5-b7-global';
        const globalRoomId = "CLASS_ARENA"; // 固定一个 ID，所有人都在一起

        let currentUser = null;
        let playerName = "";
        let currentQuestion = 0;
        let score = 0;

        const questions = [
            { q: "Apakah peristiwa yang membawa kepada pembentukan Rukun Negara?", options: ["Kemerdekaan 1957", "Peristiwa 13 Mei 1969", "Pembentukan Malaysia 1963", "Konfrontasi Indonesia"], correct: 1, info: "Rukun Negara digubal oleh MAGERAN selepas rusuhan kaum pada 13 Mei 1969." },
            { q: "Manakah antara berikut BUKAN matlamat Rukun Negara?", options: ["Mencapai perpaduan lebih erat", "Membentuk masyarakat adil", "Mewujudkan masyarakat sekular", "Memelihara cara hidup demokratik"], correct: 2, info: "Rukun Negara bertujuan membina masyarakat progresif, bukan sekular." },
            { q: "Prinsip 'Kepercayaan kepada Tuhan' menekankan bahawa...", options: ["Agama Islam adalah wajib", "Agama menjadi unsur penting jati diri", "Rakyat tidak perlu beragama", "Semua agama adalah sama"], correct: 1, info: "Agama merupakan asas kehidupan rakyat Malaysia." },
            { q: "Siapakah yang mengisytiharkan Rukun Negara pada 31 Ogos 1970?", options: ["Tunku Abdul Rahman", "Tun Abdul Razak", "YDPA Tuanku Nasiruddin Shah", "Tun Hussein Onn"], correct: 2, info: "Yang di-Pertuan Agong IV mengisytiharkan Rukun Negara bersempena ulang tahun kemerdekaan ke-13." },
            { q: "Laporan Rahman Talib 1960 menjadi asas kepada pembentukan...", options: ["Penyata Razak", "Akta Pelajaran 1961", "KBSR", "Falsafah Pendidikan Kebangsaan"], correct: 1, info: "Laporan ini menekankan penggunaan Bahasa Melayu sebagai bahasa pengantar." },
            { q: "Dasar Pendidikan Kebangsaan bermatlamat untuk...", options: ["Meningkatkan ekonomi", "Memupuk perpaduan melalui sekolah", "Menghapuskan sekolah swasta", "Mengajar bahasa asing"], correct: 1, info: "Sistem persekolahan yang seragam adalah alat perpaduan utama." },
            { q: "Apakah tujuan pengenalan Kurikulum Baru Sekolah Rendah (KBSR) pada 1982?", options: ["Menambah subjek Sejarah", "Menekankan kemahiran 3M", "Mewajibkan Bahasa Inggeris", "Mengurangkan waktu rehat"], correct: 1, info: "3M (Membaca, Menulis, Mengira) adalah asas pendidikan sekolah rendah." },
            { q: "Falsafah Pendidikan Kebangsaan (1988) menekankan pembangunan insan secara...", options: ["Mekanikal", "Ekonomi sahaja", "Menyeluruh dan Bersepadu (JERI)", "Teknikal"], correct: 2, info: "JERI merangkumi Jasmani, Emosi, Rohani dan Intelek." },
            { q: "Akta Bahasa Kebangsaan telah digubal pada tahun...", options: ["1957", "1963", "1967", "1970"], correct: 2, info: "Akta ini memperkasakan kedudukan Bahasa Melayu mengikut Perkara 152." },
            { q: "Apakah peranan Dewan Bahasa dan Pustaka (DBP)?", options: ["Mencetak duit", "Memartabatkan Bahasa Melayu", "Mengurus sekolah", "Menganjurkan pilihan raya"], correct: 1, info: "DBP berperanan memperkayakan bahasa kebangsaan dalam semua bidang." },
            { q: "Teras pertama Dasar Kebudayaan Kebangsaan ialah...", options: ["Berteraskan budaya Barat", "Berteraskan budaya kaum minoriti", "Berteraskan budaya rakyat asal rantau ini", "Berteraskan budaya Arab"], correct: 2, info: "Kebudayaan rakyat asal rantau ini menjadi teras identiti negara." },
            { q: "Slogan 'Sukan Untuk Semua' diperkenalkan untuk...", options: ["Mencari juara Olimpik", "Memupuk semangat integrasi nasional", "Membina lebih banyak stadium", "Menjual peralatan sukan"], correct: 1, info: "Sukan adalah alat yang sangat berkesan untuk menyatukan pelbagai kaum." },
            { q: "Program '1 Murid 1 Sukan' (1M1S) mewajibkan setiap murid...", options: ["Menjadi atlet negara", "Menyertai sekurang-kurangnya satu sukan", "Membeli baju sukan baru", "Menonton perlawanan bola sepak"], correct: 1, info: "1M1S bertujuan menggalakkan gaya hidup sihat dan perpaduan." },
            { q: "Rukun Tetangga yang diperkenalkan pada 1975 bertujuan untuk...", options: ["Mencari kerja", "Keselamatan komuniti dan perpaduan", "Mengutip cukai pintu", "Membersihkan kawasan longkang"], correct: 1, info: "Pada asalnya ia berfokus kepada kawalan keselamatan setempat." },
            { q: "Keluhuran Perlembagaan bermaksud...", options: ["Raja berkuasa mutlak", "Perlembagaan adalah undang-undang tertinggi", "Rakyat bebas melanggar undang-undang", "Parlimen lebih tinggi dari undang-undang"], correct: 1, info: "Semua rakyat dan institusi tertakluk kepada keluhuran Perlembagaan." }
        ];

        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();
        onAuthStateChanged(auth, (user) => { if (user) currentUser = user; });

        window.startGame = function() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert("Sila masukkan nama anda!");
            
            playerName = name;
            document.getElementById('display-name').innerText = playerName;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            
            updateCloud();
            listenLeaderboard();
            showQuestion();
        };

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = `Soalan ${currentQuestion + 1}/${questions.length}`;
            document.getElementById('progress-fill').style.width = `${(currentQuestion / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "ans-btn w-full text-left p-4 rounded-2xl border-2 border-gray-100 bg-white hover:border-blue-600 hover:bg-blue-50 font-bold flex items-center shadow-sm";
                btn.innerHTML = `<span class="w-8 h-8 rounded-lg bg-gray-100 flex items-center justify-center mr-4 text-xs text-gray-400 font-black">${String.fromCharCode(65+i)}</span> ${opt}`;
                btn.onclick = () => checkAns(i);
                container.appendChild(btn);
            });
        }

        function checkAns(idx) {
            const isCorrect = idx === questions[currentQuestion].correct;
            if (isCorrect) {
                score += 10;
                document.getElementById('feedback-icon').innerText = "✅";
                document.getElementById('feedback-title').innerText = "Mantap!";
                document.getElementById('feedback-title').className = "text-3xl font-black text-green-600 mb-2";
            } else {
                document.getElementById('feedback-icon').innerText = "❌";
                document.getElementById('feedback-title').innerText = "Salah!";
                document.getElementById('feedback-title').className = "text-3xl font-black text-red-600 mb-2";
            }
            document.getElementById('feedback-text').innerText = questions[currentQuestion].info;
            document.getElementById('score-display').innerText = score;
            document.getElementById('feedback-overlay').classList.remove('hidden');
            updateCloud();
        }

        window.nextQuestion = function() {
            document.getElementById('feedback-overlay').classList.add('hidden');
            currentQuestion++;
            if (currentQuestion < questions.length) showQuestion();
            else showFinal();
        };

        async function updateCloud() {
            if (!currentUser) return;
            const ref = doc(db, 'artifacts', baseAppId, 'public', 'data', `lb_${globalRoomId}`, currentUser.uid);
            await setDoc(ref, { name: playerName, score: score, ts: Date.now() }, { merge: true });
        }

        function listenLeaderboard() {
            const col = collection(db, 'artifacts', baseAppId, 'public', 'data', `lb_${globalRoomId}`);
            onSnapshot(col, (snap) => {
                const players = [];
                snap.forEach(d => players.push(d.data()));
                players.sort((a, b) => b.score - a.score);
                
                // Mini (Top 3)
                document.getElementById('mini-leaderboard').innerHTML = players.slice(0, 3).map((p, i) => `
                    <div class="flex justify-between items-center bg-white p-2 px-3 rounded-xl shadow-sm border-l-4 ${p.name === playerName ? 'border-yellow-400 font-bold' : 'border-blue-600'}">
                        <span class="text-xs truncate max-w-[150px]">${i+1}. ${p.name}</span>
                        <span class="text-xs font-black text-blue-600">${p.score}</span>
                    </div>
                `).join('') || '<p class="text-xs text-gray-400 italic">Menunggu rakan lain...</p>';

                // Final Leaderboard
                document.getElementById('final-leaderboard').innerHTML = players.map((p, i) => `
                    <div class="flex justify-between items-center p-3 rounded-xl mb-1 ${p.name === playerName ? 'bg-yellow-100 ring-2 ring-yellow-400' : 'bg-gray-50'}">
                        <span class="text-sm font-bold text-gray-700">${i+1}. ${p.name}</span>
                        <span class="text-sm font-black text-blue-600">${p.score}</span>
                    </div>
                `).join('');
            });
        }

        function showFinal() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('progress-fill').style.width = "100%";
        }
    </script>
</body>
</html>
